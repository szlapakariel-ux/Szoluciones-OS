<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#0d9488">
    <title>{% block title %}Szoluciones OS{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50:  '#f0fdf9',
                            100: '#ccfbf1',
                            200: '#99f6e4',
                            300: '#5eead4',
                            400: '#2dd4bf',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                        }
                    }
                }
            }
        }
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col" style="padding-bottom: 4rem;">

    <!-- Header -->
    <header class="bg-primary-600 text-white px-4 py-3 flex items-center justify-between sticky top-0 z-20 shadow">
        <a href="{% url 'app_home' %}" class="font-bold text-base tracking-tight">Szoluciones OS</a>
        {% if request.user.negocio %}
        <span class="text-xs text-primary-100 truncate max-w-[180px]">{{ request.user.negocio.nombre }}</span>
        {% endif %}
    </header>

    <!-- Content -->
    <main class="flex-1 px-4 py-5 max-w-lg mx-auto w-full">
        {% block content %}{% endblock %}
    </main>

    <!-- Bottom nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex z-20 safe-area-inset-bottom">
        <a href="{% url 'app_venta' %}"
           class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-xs font-medium
                  {% if active_tab == 'venta' %}text-primary-600{% else %}text-gray-500 hover:text-gray-700{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M3 3h2l.4 2M7 13h10l4-9H5.4M7 13L5.4 5M7 13l-2.3 2.3c-.6.6-.18 1.7.7 1.7H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            Venta
        </a>
        <a href="{% url 'app_caja' %}"
           class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-xs font-medium
                  {% if active_tab == 'caja' %}text-primary-600{% else %}text-gray-500 hover:text-gray-700{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            Caja
        </a>
        <a href="{% url 'app_stock' %}"
           class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-xs font-medium
                  {% if active_tab == 'stock' %}text-primary-600{% else %}text-gray-500 hover:text-gray-700{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.6a1 1 0 00-.7.3l-2.4 2.4a1 1 0 01-.7.3H9.4a1 1 0 01-.7-.3L6.3 13.3A1 1 0 005.6 13H4"/>
            </svg>
            Stock
        </a>
        <a href="/admin/"
           class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-xs font-medium text-gray-500 hover:text-gray-700">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M10.3 4.3c.4-1.8 2.9-1.8 3.4 0a1.7 1.7 0 002.6 1.1c1.5-.9 3.3.8 2.4 2.4a1.7 1.7 0 001 2.6c1.8.4 1.8 2.9 0 3.4a1.7 1.7 0 00-1.1 2.6c.9 1.5-.8 3.3-2.4 2.4a1.7 1.7 0 00-2.6 1c-.4 1.8-2.9 1.8-3.4 0a1.7 1.7 0 00-2.6-1.1c-1.5.9-3.3-.8-2.4-2.4a1.7 1.7 0 00-1-2.6c-1.8-.4-1.8-2.9 0-3.4a1.7 1.7 0 001.1-2.6c-.9-1.5.8-3.3 2.4-2.4a1.7 1.7 0 002.6-1z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Admin
        </a>
    </nav>

</body>
</html>
