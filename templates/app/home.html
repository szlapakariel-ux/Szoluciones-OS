{% extends "app/base.html" %}

{% block title %}Inicio · Szoluciones OS{% endblock %}

{% block content %}
<h1 class="text-lg font-semibold text-gray-800 mb-4">Buen día</h1>

{% if kpis %}
<div class="grid grid-cols-2 gap-3 mb-6">
    {% for kpi in kpis %}
    <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
        <div class="text-xs text-gray-400 mb-1 truncate">{{ kpi.title }}</div>
        <div class="text-xl font-bold text-primary-600 leading-tight">{{ kpi.metric }}</div>
        <div class="text-xs text-gray-400 mt-0.5 truncate">{{ kpi.footer }}</div>
    </div>
    {% endfor %}
</div>
{% endif %}

<div class="grid grid-cols-3 gap-3">
    <a href="{% url 'app_venta' %}"
       class="flex flex-col items-center bg-primary-600 text-white rounded-xl p-4 shadow-sm active:bg-primary-700 transition-colors">
        <svg class="w-8 h-8 mb-2" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
        </svg>
        <span class="text-xs font-semibold text-center leading-tight">Nueva venta</span>
    </a>
    <a href="{% url 'app_caja' %}"
       class="flex flex-col items-center bg-white text-gray-700 rounded-xl p-4 shadow-sm border border-gray-100 active:bg-gray-50 transition-colors">
        <svg class="w-8 h-8 mb-2 text-primary-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        <span class="text-xs font-semibold text-center leading-tight">Ver caja</span>
    </a>
    <a href="{% url 'app_stock' %}"
       class="flex flex-col items-center bg-white text-gray-700 rounded-xl p-4 shadow-sm border border-gray-100 active:bg-gray-50 transition-colors">
        <svg class="w-8 h-8 mb-2 text-primary-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.6a1 1 0 00-.7.3l-2.4 2.4a1 1 0 01-.7.3H9.4a1 1 0 01-.7-.3L6.3 13.3A1 1 0 005.6 13H4"/>
        </svg>
        <span class="text-xs font-semibold text-center leading-tight">Ver stock</span>
    </a>
</div>
{% endblock %}
